<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Safqah Capital — Developer Portal</title>
  <script>
    // Redirect to index.html with the path preserved as a hash fragment.
    // GitHub Pages serves 404.html for unknown paths; this script converts
    // the path into a hash route so the Angular app can handle it.
    var segment = 1; // number of path segments to keep (repo lives at /developers-portal-ux/)
    var loc = window.location;
    loc.replace(
      loc.protocol + '//' + loc.hostname + (loc.port ? ':' + loc.port : '') +
      loc.pathname.split('/').slice(0, 1 + segment).join('/') + '/' +
      '?/' + loc.pathname.slice(1).split('/').slice(segment).join('/').replace(/&/g, '~and~') +
      (loc.search ? '&' + loc.search.slice(1).replace(/&/g, '~and~') : '') +
      loc.hash
    );
  </script>
</head>
<body></body>
</html>
